<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estudiantes</title>
    <link rel="stylesheet" href="./estilos.css" />
  </head>
  <body>
    <div class="container">
      <!-- header -->
      <div class="header">
        <div class="header-title">Laboratorio 7  Estudiantes</div>
        <div class="header-subtitle">Consulta de estudiantes</div>
      </div>

      <!-- controles -->
      <div class="card">
        <div class="controls">
          <div class="field">
            <label for="txtSearch">Buscar por nombre o apellido</label>
            <input type="text" id="txtSearch" placeholder="Ej: Carlos" />
          </div>

          <div class="field field-sort">
            <label for="selOrder">Ordenar por nombre</label>
            <select id="selOrder">
              <option value="asc">A → Z</option>
              <option value="desc">Z → A</option>
            </select>
          </div>

          <div class="field field-btns">
            <button id="btnLoad" class="btn btn-primary" type="button">Consultar</button>
            <button id="btnClear" class="btn btn-secondary" type="button">Limpiar</button>
          </div>
        </div>
      </div>

      <!-- mensaje de estado -->
      <div id="statusMsg" class="status status-muted" style="display:none;"></div>

      <!-- tabla -->
      <div class="card">
        <div class="table-wrap">
          <table id="tblEstudiantes">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Correo</th>
                <th>Carrera</th>
              </tr>
            </thead>
            <tbody id="tbodyStudents"></tbody>
          </table>
        </div>
      </div>
    </div>
    <script src="./app.js" type="module"></script>
  </body>
</html>
